# 双雷达 multi_test：复制为 multi_config.ini 后修改路径。
# 运行：./multi_test /path/to/multi_config.ini
# 说明：请用 [lidar1]/[lidar2] 下扁平的 input.*（勿使用顶层 [source_type]+[network]，该组合仅用于单路 sample/pcl_tool）。
# 可选：./multi_test /path/to/multi_config.ini 1   （两路均强制 use_gpu=true）

# 第一段雷达（键名与 sample_config.example.ini 相同，仅节名不同）
[lidar1]
driver.use_gpu = false

input.source_type = lidar
input.device_ip_address = 192.168.1.201
input.ptc_port = 9347
input.udp_port = 2368
input.multicast_ip_address =
input.use_ptc_connected = true
input.correction_file_path = Your correction file path
input.firetimes_path = Your firetime file path
input.host_ip_address =
input.fault_message_port = 9348

decoder.enable_packet_loss_tool = false
decoder.socket_buffer_size = 262144000

[lidar2]
driver.use_gpu = false

input.source_type = lidar
input.device_ip_address = 192.168.1.202
input.ptc_port = 9347
input.udp_port = 2369
input.multicast_ip_address =
input.use_ptc_connected = true
input.correction_file_path = Your correction file path
input.firetimes_path = Your firetime file path
input.host_ip_address =
input.fault_message_port = 9348

decoder.enable_packet_loss_tool = false
decoder.socket_buffer_size = 262144000
