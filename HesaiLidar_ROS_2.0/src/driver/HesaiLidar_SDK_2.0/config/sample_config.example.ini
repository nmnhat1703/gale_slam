# 复制为 sample_config.ini 后修改路径。
# ./sample /path/to/sample_config.ini
# ./sample /path/to/sample_config.ini 1   （末尾 1：强制 use_gpu=true）
#
# [source_type] 选择数据源场景，具体参数写在对应节 [network]、[pcap]、[serial]、[ros]、[tcp]。
# 只有与 source_type 匹配的节会被使用，其他节的参数会被忽略。
#
# source_type 取值：
#   network | lidar | online  -> 使用 [network] 节（在线 UDP）
#   pcap | offline            -> 使用 [pcap] 节
#   serial                    -> 使用 [serial] 节
#   ros | external            -> 使用 [ros] 节（外部输入）
#   tcp | lidar_tcp           -> 使用 [tcp] 节（在线 TCP）

[source_type]
source_type = pcap

# ==================== 数据源配置（根据 source_type 选择使用） ====================

[pcap]
pcap_path = Your pcap file path
correction_file_path = Your correction file path
firetimes_path = Your firetime file path

[network]
device_ip_address = 192.168.1.201
ptc_port = 9347
udp_port = 2368
multicast_ip_address =
use_ptc_connected = true
correction_file_path = Your correction file path
firetimes_path = Your firetime file path
host_ip_address =
fault_message_port = 0
ptc_mode = tcp
certFile =
privateKeyFile =
caFile =

[tcp]
device_ip_address = 192.168.1.201
device_tcp_src_port = 5121
ptc_port = 9347
use_ptc_connected = true
correction_file_path = Your correction file path
firetimes_path = Your firetime file path

[serial]
rs485_com = Your serial port name for receiving point cloud
rs232_com = Your serial port name for sending cmd
point_cloud_baudrate = 3125000
correction_save_path =
correction_file_path = Your correction file path

[ros]
correction_file_path = Your correction file path
firetimes_path = Your firetime file path

# ==================== 通用配置 ====================

[driver]
use_gpu = false

[decoder]
pcap_play_synchronization = true
play_rate = 1.0
pcap_play_in_loop = false
socket_buffer_size = 262144000
enable_packet_loss_tool = false
enable_packet_timeloss_tool = false
packet_timeloss_tool_continue = false

# ==================== Packet Loss 检测配置 ====================
# 启用 enable_packet_loss_tool 后，需设置 run_time > 0 才会进入检测模式
# run_time 单位：秒（仅用于在线雷达丢包检测）
[packet_loss]
run_time = 0

